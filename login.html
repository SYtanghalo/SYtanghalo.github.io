<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录到账号</title>
    <style>
        body{
            background-color: rgb(3, 186, 227);
        }
        #login{
            width: 300px;
            margin: 100px auto;
            background-color: #fff;
            padding: 20px;
            border-radius:  5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1{
            text-align: center;
        }
        input{
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #loginBtn{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: rgb(3, 186, 227);
            color: #fff;
        }
        #cancleBtn{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: rgb(255, 255, 255);
            color: #000000;
        }
    </style>
</head>
<body background="background.jpg">
    <div id="login">
        <h1>账号登录</h1>
        <form action="">
            <div class="form-item">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username">

            </div>
            <div class="form-item">
                <label for="username">密码</label>
                <input type="password" id="password" name="username">
                
            </div>
            <div class="form-item">
                <button type="button" id="loginBtn">登录</button>
            </div>

            <script>
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.addEventListener('click', function(){
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    if(username === '' || password === ''){
                            alert('用户名和密码不能为空');
                            return;
                    }else{
                        alert("登录成功...即将跳转")
                        window.location.href = 'https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click';
                    }
                })
            </script>

            <div class="form-item">
                <button type="button" id="cancleBtn">取消</button>
            </div>

            <script>
                const cancleBtn = document.getElementById('cancleBtn');
                cancleBtn.addEventListener('click', function(){
                    window.location.href = 'index.html'
                })
            </script>

        </form>
    </div>

    
</body>
</html>
