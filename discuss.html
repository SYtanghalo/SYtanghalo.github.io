
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cmods-乐享棋异 - 讨论大厅</title>
    <!-- 引入 TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义动画关键帧 */
        @keyframes slideInDown {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 动画类 */
        .animate-header { animation: slideInDown 0.8s ease-out forwards; }
        .animate-card { opacity: 0; animation: fadeInUp 0.6s ease-out forwards; }

        /* 背景与玻璃拟态 */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .glass-header {
            background: rgba(14, 165, 233, 0.95); /* Sky-500 with opacity */
            backdrop-filter: blur(10px);
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col">

    <!-- 头部导航 -->
    <header id="main-header" class="w-full glass-header shadow-lg z-50 relative animate-header text-white">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.reload()">
                <i class="fa-solid fa-gamepad text-3xl"></i>
                <h1 class="text-2xl font-bold tracking-wide">Cmods-乐享棋异</h1>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-sky-200 transition-colors">首页</a>
                <a href="#" class="text-sky-100 border-b-2 border-white pb-1">讨论大厅</a>
                <a href="https://game.hullqin.cn/" class="hover:text-sky-200 transition-colors">桌游合集</a>
                <a href="community.html" class="hover:text-sky-200 transition-colors">社区</a>
                <a href="login.html" class="hover:text-sky-200 transition-colors">登录</a>
            </nav>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        
        <!-- 发布帖子区域 -->
        <section class="mb-8 animate-card" style="animation-delay: 0.1s;">
            <div class="glass-panel rounded-2xl p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa-solid fa-pen-to-square mr-2 text-sky-500"></i> 发布新话题
                </h2>
                <form id="post-form" class="space-y-4">
                    <div>
                        <input type="text" id="post-title" placeholder="请输入标题..." 
                            class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none transition-all"
                            required>
                    </div>
                    <div>
                        <textarea id="post-content" rows="3" placeholder="分享你的棋局心得、疑问或趣事..." 
                            class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none transition-all resize-none"
                            required></textarea>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex space-x-2 text-gray-500">
                            <button type="button" class="hover:text-sky-500 transition"><i class="fa-solid fa-image"></i></button>
                            <button type="button" class="hover:text-sky-500 transition"><i class="fa-solid fa-link"></i></button>
                        </div>
                        <button type="submit" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transform transition hover:scale-105 active:scale-95">
                            发布帖子
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- 筛选与搜索 -->
        <section class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 animate-card" style="animation-delay: 0.2s;">
            <div class="flex space-x-2 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto">
                <button class="filter-btn active px-4 py-1.5 rounded-full bg-sky-500 text-white text-sm font-medium transition shadow-sm" data-filter="all">全部</button>
                <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-gray-600 hover:bg-gray-100 text-sm font-medium transition shadow-sm" data-filter="strategy">策略心得</button>
                <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-gray-600 hover:bg-gray-100 text-sm font-medium transition shadow-sm" data-filter="question">求助提问</button>
                <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-gray-600 hover:bg-gray-100 text-sm font-medium transition shadow-sm" data-filter="chat">闲聊交流</button>
            </div>
            <div class="relative w-full md:w-64">
                <input type="text" id="search-input" placeholder="搜索帖子..." 
                    class="w-full pl-10 pr-4 py-2 rounded-full bg-white border border-gray-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none transition-all text-sm">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
        </section>

        <!-- 帖子列表 -->
        <section id="posts-container" class="space-y-4">
            <!-- 帖子将通过 JS 动态插入这里 -->
        </section>

        <!-- 空状态提示 (默认隐藏) -->
        <div id="empty-state" class="hidden text-center py-12 animate-card">
            <i class="fa-regular fa-folder-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">暂无相关帖子，快来发布第一条吧！</p>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="mt-auto py-6 text-center text-gray-500 text-sm animate-card" style="animation-delay: 0.3s;">
        <p>&copy; 2026 Cmods-乐享棋异. All rights reserved.</p>
    </footer>

    <!-- JavaScript 逻辑 -->
    <script>
        // 模拟初始数据
        const initialPosts = [
            {
                id: 1,
                title: "新手求问：开局第一步走哪里优势最大？",
                content: "最近刚开始玩，感觉开局很迷茫，有没有大佬分享一下通用开局思路？",
                author: "ChessNewbie",
                avatar: "https://picsum.photos/seed/user1/100/100",
                category: "question",
                likes: 12,
                comments: 5,
                time: "2小时前",
                isLiked: false
            },
            {
                id: 2,
                title: "分享一个我昨天发现的绝妙残局解法",
                content: "这个残局困扰了我很久，最后发现只要动一下马的位置就豁然开朗了，附图解。",
                author: "GrandMaster_X",
                avatar: "https://picsum.photos/seed/user2/100/100",
                category: "strategy",
                likes: 45,
                comments: 18,
                time: "5小时前",
                isLiked: true
            }
        ];

        // 状态管理
        let posts = JSON.parse(localStorage.getItem('cmods_posts')) || initialPosts;
        let currentFilter = 'all';
        let searchQuery = '';

        // DOM 元素
        const postsContainer = document.getElementById('posts-container');
        const postForm = document.getElementById('post-form');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('search-input');
        const emptyState = document.getElementById('empty-state');

        // 初始化渲染
        document.addEventListener('DOMContentLoaded', () => {
            renderPosts();
            
            // 触发入场动画
            const cards = document.querySelectorAll('.animate-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${0.1 + index * 0.1}s`;
            });
        });

        // 渲染帖子列表
        function renderPosts() {
            postsContainer.innerHTML = '';
            
            const filteredPosts = posts.filter(post => {
                const matchesFilter = currentFilter === 'all' || post.category === currentFilter;
                const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      post.content.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            if (filteredPosts.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filteredPosts.forEach((post, index) => {
                    const postEl = createPostElement(post, index);
                    postsContainer.appendChild(postEl);
                });
            }
        }

        // 创建单个帖子 HTML 元素
        function createPostElement(post, index) {
            const div = document.createElement('div');
            div.className = 'glass-panel rounded-xl p-5 hover:shadow-lg transition-all duration-300 animate-card border-l-4 border-transparent hover:border-sky-500';
            div.style.animationDelay = `${index * 0.05}s`;
            
            const categoryLabels = {
                'strategy': '<span class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full">策略</span>',
                'question': '<span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">求助</span>',
                'chat': '<span class="bg-green-100 text-green-600 text-xs px-2 py-1 rounded-full">闲聊</span>'
            };

            div.innerHTML = `
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center space-x-3">
                        <img src="${post.avatar}" alt="用户头像" class="w-10 h-10 rounded-full object-cover border border-gray-200">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg leading-tight hover:text-sky-600 cursor-pointer transition">${post.title}</h3>
                            <div class="flex items-center space-x-2 mt-1">
                                <span class="text-xs text-gray-500">${post.author}</span>
                                <span class="text-xs text-gray-400">•</span>
                                <span class="text-xs text-gray-500">${post.time}</span>
                                ${categoryLabels[post.category] || ''}
                            </div>
                        </div>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-ellipsis"></i></button>
                </div>
                <p class="text-gray-600 text-sm mb-4 line-clamp-2">${post.content}</p>
                <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                    <div class="flex space-x-6">
                        <button onclick="toggleLike(${post.id})" class="flex items-center space-x-1 text-sm ${post.isLiked ? 'text-red-500' : 'text-gray-500'} hover:text-red-500 transition group">
                            <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart group-active:scale-125 transition-transform"></i>
                            <span>${post.likes}</span>
                        </button>
                        <button class="flex items-center space-x-1 text-sm text-gray-500 hover:text-sky-500 transition">
                            <i class="fa-regular fa-comment"></i>
                            <span>${post.comments}</span>
                        </button>
                        <button class="flex items-center space-x-1 text-sm text-gray-500 hover:text-sky-500 transition">
                            <i class="fa-solid fa-share-nodes"></i>
                            <span>分享</span>
                        </button>
                    </div>
                    <button onclick="deletePost(${post.id})" class="text-xs text-gray-400 hover:text-red-500 transition">删除</button>
                </div>
            `;
            return div;
        }

        // 发布新帖子
        postForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            
            if (!title.trim() || !content.trim()) return;

            const newPost = {
                id: Date.now(),
                title: title,
                content: content,
                author: "我",
                avatar: "https://picsum.photos/seed/me/100/100",
                category: "chat", // 默认分类，可扩展选择器
                likes: 0,
                comments: 0,
                time: "刚刚",
                isLiked: false
            };

            posts.unshift(newPost);
            savePosts();
            renderPosts();
            postForm.reset();
            
            // 简单的成功提示动画
            const btn = postForm.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "发布成功!";
            btn.classList.add('bg-green-500');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-green-500');
            }, 2000);
        });

        // 点赞功能
        window.toggleLike = function(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.isLiked = !post.isLiked;
                post.likes += post.isLiked ? 1 : -1;
                savePosts();
                renderPosts();
            }
        };

        // 删除功能
        window.deletePost = function(id) {
            if(confirm('确定要删除这条帖子吗？')) {
                posts = posts.filter(p => p.id !== id);
                savePosts();
                renderPosts();
            }
        };

        // 筛选功能
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮样式
                filterBtns.forEach(b => {
                    b.classList.remove('bg-sky-500', 'text-white');
                    b.classList.add('bg-white', 'text-gray-600');
                });
                btn.classList.remove('bg-white', 'text-gray-600');
                btn.classList.add('bg-sky-500', 'text-white');
                
                // 更新状态并渲染
                currentFilter = btn.dataset.filter;
                renderPosts();
            });
        });

        // 搜索功能
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPosts();
        });

        // 持久化存储
        function savePosts() {
            localStorage.setItem('cmods_posts', JSON.stringify(posts));
        }
    </script>
</body>
</html>
