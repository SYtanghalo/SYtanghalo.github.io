
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cmods-乐享棋异 - 社区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* 动画定义 */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entry {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; 
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .tag-pill {
            transition: all 0.2s;
        }
        .tag-pill:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-slate-700 min-h-screen flex flex-col">

    <!-- 顶部导航 -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                    <div class="bg-sky-500 text-white p-2 rounded-lg shadow-lg shadow-sky-500/30">
                        <i class="fa-solid fa-gamepad text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">Cmods<span class="text-sky-500">-</span>社区</span>
                </div>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-slate-500 hover:text-sky-600 font-medium transition">回到首页</a>
                    <a href="#" class="text-sky-600 font-medium border-b-2 border-sky-500 py-5">广场</a>
                    <a href="#" class="text-slate-500 hover:text-sky-600 font-medium transition">攻略库</a>
                    <a href="#" class="text-slate-500 hover:text-sky-600 font-medium transition">赛事中心</a>
                    <a href="#" class="text-slate-500 hover:text-sky-600 font-medium transition">我的关注</a>
                </div>

                <div class="flex items-center gap-4">
                    <div class="relative hidden sm:block">
                        <input type="text" id="global-search" placeholder="搜索话题..." class="pl-9 pr-4 py-1.5 bg-slate-100 border-none rounded-full text-sm focus:ring-2 focus:ring-sky-500 focus:bg-white transition-all w-48 focus:w-64 outline-none">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    </div>
                    <button class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-1.5 rounded-full text-sm font-medium shadow-md shadow-sky-500/20 transition flex items-center gap-2" onclick="openModal()">
                        <i class="fa-solid fa-pen-nib"></i> 发帖
                    </button>
                    <img src="https://picsum.photos/seed/avatar_main/100/100" alt="用户头像" class="w-9 h-9 rounded-full border-2 border-white shadow-sm cursor-pointer hover:scale-105 transition">
                </div>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- 左侧边栏：分类与统计 -->
        <aside class="lg:col-span-3 space-y-6 animate-entry" style="animation-delay: 0.1s;">
            <!-- 用户信息卡片 -->
            <div class="glass-card rounded-2xl p-5 text-center relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-full h-20 bg-gradient-to-r from-sky-400 to-indigo-500 opacity-10 group-hover:opacity-20 transition"></div>
                <img src="https://picsum.photos/seed/user_profile/150/150" alt="个人头像" class="w-20 h-20 rounded-full mx-auto border-4 border-white shadow-md mb-3 relative z-10">
                <h3 class="font-bold text-lg text-slate-800">棋艺探索者</h3>
                <p class="text-xs text-slate-500 mb-4">Lv.5 资深棋手 | 积分 2450</p>
                <div class="flex justify-around text-sm border-t border-slate-100 pt-4">
                    <div class="text-center">
                        <div class="font-bold text-slate-800">12</div>
                        <div class="text-slate-400 text-xs">帖子</div>
                    </div>
                    <div class="text-center">
                        <div class="font-bold text-slate-800">348</div>
                        <div class="text-slate-400 text-xs">获赞</div>
                    </div>
                    <div class="text-center">
                        <div class="font-bold text-slate-800">56</div>
                        <div class="text-slate-400 text-xs">关注</div>
                    </div>
                </div>
            </div>

            <!-- 热门话题标签 -->
            <div class="glass-card rounded-2xl p-5 animate-entry" style="animation-delay: 0.2s;">
                <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire text-orange-500"></i> 热门标签
                </h4>
                <div class="flex flex-wrap gap-2" id="tag-cloud">
                    <!-- JS 生成标签 -->
                </div>
            </div>

            <!-- 社区公告 -->
            <div class="glass-card rounded-2xl p-5 bg-gradient-to-br from-sky-50 to-white animate-entry" style="animation-delay: 0.3s;">
                <h4 class="font-bold text-slate-800 mb-2 text-sm">📢 社区公告</h4>
                <p class="text-xs text-slate-600 leading-relaxed">
                    "夏季棋王争霸赛"报名即将截止！前100名参赛者可获得限定头像框。点击查看详情...
                </p>
            </div>
        </aside>

        <!-- 中间：帖子流 -->
        <section class="lg:col-span-6 space-y-4">
            <!-- 筛选栏 -->
            <div class="flex items-center justify-between mb-2 animate-entry" style="animation-delay: 0.15s;">
                <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar" id="filter-container">
                    <button class="filter-btn active px-4 py-1.5 rounded-full bg-slate-800 text-white text-xs font-medium transition shadow-md" data-type="all">最新</button>
                    <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-slate-600 hover:bg-slate-50 text-xs font-medium transition border border-slate-200" data-type="hot">最热</button>
                    <button class="filter-btn px-4 py-1.5 rounded-full bg-white text-slate-600 hover:bg-slate-50 text-xs font-medium transition border border-slate-200" data-type="精华">精华</button>
                </div>
            </div>

            <!-- 帖子列表容器 -->
            <div id="post-list" class="space-y-4">
                <!-- 帖子由 JS 渲染 -->
            </div>
            
            <!-- 加载更多 -->
            <div class="text-center py-6">
                <button class="text-slate-400 hover:text-sky-500 text-sm font-medium transition flex items-center justify-center gap-2 mx-auto">
                    <i class="fa-solid fa-spinner"></i> 加载更多动态
                </button>
            </div>
        </section>

        <!-- 右侧边栏：排行榜与推荐 -->
        <aside class="lg:col-span-3 space-y-6 animate-entry" style="animation-delay: 0.4s;">
            <!-- 活跃用户榜 -->
            <div class="glass-card rounded-2xl p-5">
                <h4 class="font-bold text-slate-800 mb-4 flex items-center justify-between">
                    <span><i class="fa-solid fa-trophy text-yellow-500 mr-2"></i>本周大神</span>
                    <span class="text-xs text-slate-400 font-normal cursor-pointer hover:text-sky-500">查看全部</span>
                </h4>
                <ul class="space-y-4" id="leaderboard">
                    <!-- JS 生成排行榜 -->
                </ul>
            </div>

            <!-- 推荐阅读 -->
            <div class="glass-card rounded-2xl p-5">
                <h4 class="font-bold text-slate-800 mb-4">精选攻略</h4>
                <div class="space-y-3">
                    <a href="#" class="block group">
                        <div class="flex gap-3">
                            <img src="https://picsum.photos/seed/guide1/100/100" alt="攻略缩略图" class="w-16 h-16 rounded-lg object-cover group-hover:opacity-80 transition">
                            <div>
                                <h5 class="text-sm font-medium text-slate-700 group-hover:text-sky-600 line-clamp-2">新手必看：如何快速掌握开局定式？</h5>
                                <span class="text-xs text-slate-400 mt-1 block">2.3k 阅读</span>
                            </div>
                        </div>
                    </a>
                    <a href="#" class="block group">
                        <div class="flex gap-3">
                            <img src="https://picsum.photos/seed/guide2/100/100" alt="残局解析图" class="w-16 h-16 rounded-lg object-cover group-hover:opacity-80 transition">
                            <div>
                                <h5 class="text-sm font-medium text-slate-700 group-hover:text-sky-600 line-clamp-2">残局解析：马炮争雄的经典案例</h5>
                                <span class="text-xs text-slate-400 mt-1 block">1.8k 阅读</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </aside>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-slate-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="flex justify-center gap-6 mb-4 text-slate-400">
                <i class="fa-brands fa-github hover:text-slate-800 cursor-pointer transition text-xl"></i>
                <i class="fa-brands fa-twitter hover:text-sky-500 cursor-pointer transition text-xl"></i>
                <i class="fa-brands fa-weixin hover:text-green-500 cursor-pointer transition text-xl"></i>
            </div>
            <p class="text-slate-500 text-sm">&copy; 2026 Cmods-乐享棋异. All rights reserved. </p>
        </div>
    </footer>

    <!-- 发帖模态框 (默认隐藏) -->
    <div id="post-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bg-white rounded-2xl shadow-2xl p-6 transform transition-all scale-95 opacity-0" id="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-800">发布新话题</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="new-post-form" class="space-y-4">
                <div>
                    <input type="text" id="modal-title" placeholder="输入标题，让更多人看到..." class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none transition" required>
                </div>
                <div>
                    <select id="modal-category" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none text-slate-600">
                        <option value="闲聊">💬 日常闲聊</option>
                        <option value="求助">🆘 技术求助</option>
                        <option value="分享">✨ 精彩分享</option>
                        <option value="赛事">🏆 赛事讨论</option>
                    </select>
                </div>
                <div>
                    <textarea id="modal-content-text" rows="5" placeholder="分享你的想法..." class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none transition resize-none" required></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg transition text-sm font-medium">取消</button>
                    <button type="submit" class="px-6 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg shadow-lg shadow-sky-500/30 transition text-sm font-medium">立即发布</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 模拟数据 ---
        const currentUser = {
            name: "棋艺探索者",
            avatar: "https://picsum.photos/seed/avatar_main/100/100"
        };

        let posts = [
            {
                id: 101,
                author: "MasterChess",
                avatar: "https://picsum.photos/seed/u1/100/100",
                title: "关于最近版本更新后AI难度的调整讨论",
                content: "感觉更新后残局阶段的AI计算深度明显增加了，大家有没有同感？特别是马兵对士象全的情况...",
                category: "赛事",
                tags: ["版本更新", "AI分析"],
                likes: 128,
                comments: 45,
                time: "10分钟前",
                isLiked: false,
                isHot: true
            },
            {
                id: 102,
                author: "NovicePlayer",
                avatar: "https://picsum.photos/seed/u2/100/100",
                title: "萌新求教：这个开局叫什么名字？",
                content: "如图，红方第一步走炮二平五，黑方跳马，然后红方再走马二进三...这种布局有什么讲究吗？",
                category: "求助",
                tags: ["新手入门", "布局"],
                likes: 12,
                comments: 8,
                time: "35分钟前",
                isLiked: true,
                isHot: false
            },
            {
                id: 103,
                author: "StrategyKing",
                avatar: "https://picsum.photos/seed/u3/100/100",
                title: "【干货】三步学会破解屏风马",
                content: "今天分享一个我自己总结的破局思路，亲测在钻石段位以下胜率极高。核心在于控制肋道...",
                category: "分享",
                tags: ["攻略", "屏风马"],
                likes: 356,
                comments: 89,
                time: "2小时前",
                isLiked: false,
                isHot: true
            },
            {
                id: 104,
                author: "CasualGamer",
                avatar: "https://picsum.photos/seed/u4/100/100",
                title: "周末有人一起切磋吗？",
                content: "坐标上海，线下或者线上都可以，主要想找人练练顺手炮。",
                category: "闲聊",
                tags: ["约战", "线下"],
                likes: 5,
                comments: 12,
                time: "5小时前",
                isLiked: false,
                isHot: false
            }
        ];

        const tags = ["开局理论", "残局精解", "软件辅助", "比赛直播", "心理博弈", "历史典故"];
        const leaders = [
            { name: "AlphaGo_Pro", score: 3200, avatar: "https://picsum.photos/seed/l1/100/100" },
            { name: "DeepBlue_X", score: 3150, avatar: "https://picsum.photos/seed/l2/100/100" },
            { name: "ChessMaster", score: 3080, avatar: "https://picsum.photos/seed/l3/100/100" }
        ];

        // --- DOM 元素 ---
        const postListEl = document.getElementById('post-list');
        const tagCloudEl = document.getElementById('tag-cloud');
        const leaderboardEl = document.getElementById('leaderboard');
        const modal = document.getElementById('post-modal');
        const modalContent = document.getElementById('modal-content');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // --- 初始化渲染 ---
        function init() {
            renderTags();
            renderLeaderboard();
            renderPosts(posts);
            setupEventListeners();
        }

        // --- 渲染函数 ---
        function renderTags() {
            tagCloudEl.innerHTML = tags.map(tag => `
                <span class="tag-pill px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full cursor-pointer hover:bg-sky-100 hover:text-sky-600">#${tag}</span>
            `).join('');
        }

        function renderLeaderboard() {
            leaderboardEl.innerHTML = leaders.map((user, index) => `
                <li class="flex items-center justify-between group cursor-pointer">
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold ${index === 0 ? 'text-yellow-500' : index === 1 ? 'text-slate-400' : 'text-orange-400'} w-4">${index + 1}</span>
                        <img src="${user.avatar}" alt="${user.name}头像" class="w-8 h-8 rounded-full border border-slate-100">
                        <span class="text-sm font-medium text-slate-700 group-hover:text-sky-600 transition">${user.name}</span>
                    </div>
                    <span class="text-xs font-bold text-sky-500 bg-sky-50 px-2 py-0.5 rounded">${user.score}</span>
                </li>
            `).join('');
        }

        function renderPosts(data) {
            if (data.length === 0) {
                postListEl.innerHTML = `<div class="text-center py-10 text-slate-400">暂无相关帖子</div>`;
                return;
            }

            postListEl.innerHTML = data.map((post, index) => `
                <article class="glass-card rounded-2xl p-5 animate-entry relative group" style="animation-delay: ${index * 0.1}s">
                    <div class="flex gap-4">
                        <img src="${post.avatar}" alt="${post.author}头像" class="w-10 h-10 rounded-full object-cover border border-slate-100 flex-shrink-0">
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h2 class="font-bold text-lg text-slate-800 group-hover:text-sky-600 transition cursor-pointer mb-1">${post.title}</h2>
                                    <div class="flex items-center gap-2 text-xs text-slate-500 mb-2">
                                        <span class="font-medium text-slate-700">${post.author}</span>
                                        <span>•</span>
                                        <span>${post.time}</span>
                                        <span class="px-2 py-0.5 bg-slate-100 rounded text-slate-500">${post.category}</span>
                                    </div>
                                </div>
                                ${post.isHot ? '<i class="fa-solid fa-fire text-red-500 animate-pulse" title="热门"></i>' : ''}
                            </div>
                            
                            <p class="text-slate-600 text-sm leading-relaxed mb-3 line-clamp-2">${post.content}</p>
                            
                            <div class="flex flex-wrap gap-2 mb-3">
                                ${post.tags.map(tag => `<span class="text-xs text-sky-500 bg-sky-50 px-2 py-0.5 rounded-md">#${tag}</span>`).join('')}
                            </div>

                            <div class="flex items-center gap-6 text-slate-400 text-sm border-t border-slate-50 pt-3">
                                <button onclick="toggleLike(${post.id})" class="flex items-center gap-1.5 hover:text-red-500 transition group/btn ${post.isLiked ? 'text-red-500' : ''}">
                                    <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart group-active/btn:scale-125 transition-transform"></i>
                                    <span>${post.likes}</span>
                                </button>
                                <button class="flex items-center gap-1.5 hover:text-sky-500 transition">
                                    <i class="fa-regular fa-comment-dots"></i>
                                    <span>${post.comments}</span>
                                </button>
                                <button class="flex items-center gap-1.5 hover:text-sky-500 transition ml-auto">
                                    <i class="fa-solid fa-share-nodes"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // --- 交互逻辑 ---
        function setupEventListeners() {
            // 筛选按钮
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // UI 更新
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-slate-800', 'text-white', 'shadow-md');
                        b.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
                    });
                    e.target.classList.remove('bg-white', 'text-slate-600', 'border', 'border-slate-200');
                    e.target.classList.add('bg-slate-800', 'text-white', 'shadow-md');

                    // 数据过滤
                    const type = e.target.dataset.type;
                    let filtered = [...posts];
                    if (type === 'hot') {
                        filtered.sort((a, b) => b.likes - a.likes);
                    } else if (type === '精华') {
                        filtered = filtered.filter(p => p.likes > 50);
                    }
                    // 默认 'all' 按时间（这里简单模拟为原顺序）
                    renderPosts(filtered);
                });
            });

            // 搜索功能
            document.getElementById('global-search').addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = posts.filter(p => 
                    p.title.toLowerCase().includes(val) || 
                    p.content.toLowerCase().includes(val)
                );
                renderPosts(filtered);
            });

            // 表单提交
            document.getElementById('new-post-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('modal-title').value;
                const content = document.getElementById('modal-content-text').value;
                const category = document.getElementById('modal-category').value;

                const newPost = {
                    id: Date.now(),
                    author: currentUser.name,
                    avatar: currentUser.avatar,
                    title: title,
                    content: content,
                    category: category,
                    tags: ["新发布"],
                    likes: 0,
                    comments: 0,
                    time: "刚刚",
                    isLiked: false,
                    isHot: false
                };

                posts.unshift(newPost);
                renderPosts(posts);
                closeModal();
                e.target.reset();
                
                // 简单的成功提示
                alert("发布成功！");
            });
        }

        window.toggleLike = function(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.isLiked = !post.isLiked;
                post.likes += post.isLiked ? 1 : -1;
                renderPosts(posts); // 重新渲染以更新状态
            }
        };

        // --- 模态框控制 ---
        window.openModal = function() {
            modal.classList.remove('hidden');
            // 强制重绘以触发 transition
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closeModal = function() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };

        // 启动
        init();
    </script>
</body>
</html>
